<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
transition:.4s;
}

.dark{
background:#121212;
color:white;
}

header{
background:linear-gradient(90deg,#2563EB,#7C3AED);
padding:20px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
transition:.4s;
}

.dark .card{
background:#1f1f1f;
}

input,
textarea,
button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#2563EB;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.hidden{
display:none;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.box{
background:linear-gradient(90deg,#2563EB,#7C3AED);
padding:25px;
border-radius:15px;
color:white;
text-align:center;
}

.event-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

.event{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.dark .event{
background:#1f1f1f;
}

.event img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.delete{
background:red;
}

.toggle{
width:auto;
padding:10px;
}

</style>
</head>

<body>

<header>

<div>
<h1>🎉 EventHub</h1>
<p>Plataforma Inteligente de Eventos</p>
</div>

<button class="toggle" onclick="modoEscuro()">
🌙 Tema
</button>

</header>

<div class="container">

<div class="card" id="login">

<h2>Entrar</h2>

<input
id="nome"
placeholder="Seu nome"
>

<button onclick="entrar()">
Entrar
</button>

</div>

<div id="sistema" class="hidden">

<div class="stats">

<div class="box">
<h2 id="total">0</h2>
<p>Eventos</p>
</div>

<div class="box">
<h2 id="usuario"></h2>
<p>Usuário</p>
</div>

</div>


<div class="card">

<h2>Criar Evento</h2>

<input
id="titulo"
placeholder="Nome do evento"
>

<input
id="data"
type="date"
>

<textarea
id="descricao"
placeholder="Descrição">
</textarea>

<input
id="imagem"
placeholder="Cole URL da imagem"
>

<button onclick="criarEvento()">

Criar Evento

</button>

</div>


<div class="card">

<h2>Pesquisar</h2>

<input
id="pesquisa"
placeholder="Pesquisar evento..."
onkeyup="buscar()"
>

</div>


<div
class="event-grid"
id="eventos">

</div>

</div>

</div>

<script>

let listaEventos=
JSON.parse(
localStorage.getItem(
"eventos"
)
)||[];

function entrar(){

let nome=
document.getElementById(
"nome"
).value;

if(nome==""){
alert(
"Digite seu nome"
);
return;
}

localStorage.setItem(
"user",
nome
);

carregar();

}

function carregar(){

document
.getElementById(
"login"
)
.classList.add(
"hidden"
);

document
.getElementById(
"sistema"
)
.classList.remove(
"hidden"
);

document
.getElementById(
"usuario"
)
.innerText=
localStorage.getItem(
"user"
);

mostrar();

}

function criarEvento(){

let evento={

titulo:
titulo.value,

data:
data.value,

descricao:
descricao.value,

imagem:
imagem.value ||
"https://picsum.photos/500/300"

};

listaEventos.push(
evento
);

localStorage.setItem(
"eventos",
JSON.stringify(
listaEventos
)
);

titulo.value="";
data.value="";
descricao.value="";
imagem.value="";

mostrar();

}

function mostrar(){

let area=
document.getElementById(
"eventos"
);

area.innerHTML="";

listaEventos.forEach(
(e,index)=>{

area.innerHTML+=`

<div class="event">

<img src="${e.imagem}">

<div class="content">

<h3>
${e.titulo}
</h3>

<p>
📅 ${e.data}
</p>

<p>
${e.descricao}
</p>

<button
class="delete"
onclick="
excluir(${index})
"
>

Excluir

</button>

</div>

</div>

`;

});

document
.getElementById(
"total"
)
.innerText=
listaEventos.length;

}

function excluir(i){

listaEventos.splice(
i,1
);

localStorage.setItem(
"eventos",
JSON.stringify(
listaEventos
)
);

mostrar();

}

function buscar(){

let valor=
document
.getElementById(
"pesquisa"
)
.value
.toLowerCase();

let cards=
document.querySelectorAll(
".event"
);

cards.forEach(
(card)=>{

card.style.display=

card.innerText
.toLowerCase()
.includes(valor)

?

"block"

:

"none";

});

}

function modoEscuro(){

document.body.classList.toggle(
"dark"
);

}

if(
localStorage.getItem(
"user"
)
){

carregar();

}

</script>

</body>
</html>
