<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EventHub Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

<style>

:root{
--primary:#2563eb;
--secondary:#7c3aed;
--bg:#f4f7fb;
--card:#fff;
--text:#222;
--shadow:0 5px 20px rgba(0,0,0,.08);
}

.dark{
--bg:#111827;
--card:#1f2937;
--text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.3s;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:linear-gradient(
180deg,
var(--primary),
var(--secondary)
);

padding:30px;
color:white;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:50px;
}

.menu div{
padding:15px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}

.menu div:hover{
background:rgba(255,255,255,.2);
}

.main{
flex:1;
padding:30px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:10px;
}

button{
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
background:var(--primary);
color:white;
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
box-shadow:var(--shadow);
margin-bottom:25px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat{
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:var(--shadow);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.event{
background:var(--card);
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
}

.event img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:20px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.red{
background:red;
}

.green{
background:green;
}

.hidden{
display:none;
}

@media(max-width:900px){

.sidebar{
display:none;
}

}

</style>
</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">
🎉 EventHub
</div>

<div class="menu">
<div>Dashboard</div>
<div>Eventos</div>
<div>Participantes</div>
<div>Relatórios</div>
</div>

</div>

<div class="main">

<div class="top">

<div>
<h1>Painel Administrativo</h1>
<p>Gerenciamento Inteligente</p>
</div>

<div>

<button onclick="darkMode()">
🌙 Tema
</button>

</div>

</div>

<div class="stats">

<div class="stat">
<h1 id="totalEventos">0</h1>
<p>Total Eventos</p>
</div>

<div class="stat">
<h1 id="proximosEventos">0</h1>
<p>Próximos Eventos</p>
</div>

<div class="stat">
<h1 id="participantes">0</h1>
<p>Participantes</p>
</div>

</div>

<div class="card">

<h2>Criar Evento</h2>

<input id="titulo" placeholder="Nome">

<input id="local" placeholder="Local">

<input id="data" type="date">

<select id="categoria">

<option>Workshop</option>
<option>Palestra</option>
<option>Show</option>
<option>Esportivo</option>

</select>

<textarea id="descricao"
placeholder="Descrição"></textarea>

<input id="imagem"
placeholder="URL imagem">

<button onclick="criarEvento()">

Criar Evento

</button>

</div>


<div class="card">

<input
id="pesquisa"
placeholder="Pesquisar..."
onkeyup="pesquisar()">

</div>

<div
class="grid"
id="lista">

</div>

</div>

</div>

<script>

let eventos=
JSON.parse(
localStorage.getItem(
"eventos"
)
)||[];

function criarEvento(){

let evento={

titulo:
titulo.value,

local:
local.value,

data:
data.value,

categoria:
categoria.value,

descricao:
descricao.value,

imagem:
imagem.value ||
"https://picsum.photos/500?random="+Math.random()

}

eventos.push(
evento
);

salvar();

limpar();

mostrar();

}

function mostrar(){

let html="";

eventos.forEach(
(e,index)=>{

html+=`

<div class="event">

<img src="${e.imagem}">

<div class="content">

<h2>${e.titulo}</h2>

<p>
📍 ${e.local}
</p>

<p>
📅 ${e.data}
</p>

<p>
🏷 ${e.categoria}
</p>

<p>
${e.descricao}
</p>

<div class="actions">

<button
class="green"
onclick="editar(${index})"
>

Editar

</button>

<button
class="red"
onclick="remover(${index})"
>

Excluir

</button>

</div>

</div>

</div>

`;

});

lista.innerHTML=html;

totalEventos.innerText=
eventos.length;

proximosEventos.innerText=
eventos.length;

participantes.innerText=
eventos.length*20;

}

function editar(i){

titulo.value=
eventos[i].titulo;

local.value=
eventos[i].local;

data.value=
eventos[i].data;

categoria.value=
eventos[i].categoria;

descricao.value=
eventos[i].descricao;

imagem.value=
eventos[i].imagem;

eventos.splice(i,1);

salvar();

mostrar();

}

function remover(i){

eventos.splice(i,1);

salvar();

mostrar();

}

function pesquisar(){

let valor=
pesquisa.value
.toLowerCase();

let cards=
document.querySelectorAll(
".event"
);

cards.forEach(c=>{

c.style.display=

c.innerText
.toLowerCase()
.includes(valor)

?

"block"

:

"none";

});

}

function salvar(){

localStorage.setItem(
"eventos",
JSON.stringify(
eventos
)
);

}

function limpar(){

titulo.value="";
local.value="";
data.value="";
descricao.value="";
imagem.value="";

}

function darkMode(){

document.body.classList.toggle(
"dark"
);

}

mostrar();

</script>

</body>
</html>
