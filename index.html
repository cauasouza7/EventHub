<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EventHub Ultra</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9}
header{background:linear-gradient(90deg,#2563eb,#7c3aed);padding:20px;color:#fff;display:flex;justify-content:space-between}
.container{padding:20px;max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:20px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
input,textarea,select,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}
.events{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:20px}
.event{background:#fff;padding:20px;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.event h3{margin-bottom:10px}
.actions{display:flex;gap:10px;margin-top:10px}
.delete{background:red}
</style>
</head>
<body>

<header>
<div>
<h1>🎉 EventHub Ultra</h1>
<p>Sistema Avançado de Eventos</p>
</div>
<div>
<input id="pesquisa" placeholder="Pesquisar..." onkeyup="buscar()">
</div>
</header>

<div class="container">

<div class="grid">
<div class="card"><h2 id="total">0</h2><p>Total Eventos</p></div>
<div class="card"><h2 id="participantes">0</h2><p>Participantes</p></div>
<div class="card"><h2 id="categorias">0</h2><p>Categorias</p></div>
</div>

<div class="card" style="margin-top:20px">
<h2>Criar Evento</h2>
<input id="titulo" placeholder="Nome do evento">
<input id="local" placeholder="Local">
<input id="data" type="date">
<select id="categoria">
<option>Workshop</option>
<option>Palestra</option>
<option>Show</option>
<option>Esportivo</option>
</select>
<textarea id="descricao" placeholder="Descrição"></textarea>
<button onclick="criar()">Criar Evento</button>
</div>

<div class="card" style="margin-top:20px">
<h2>Relatório</h2>
<canvas id="grafico"></canvas>
</div>

<div class="events" id="lista"></div>

</div>

<script>
let eventos=JSON.parse(localStorage.getItem("eventos"))||[];

function criar(){
let e={
titulo:titulo.value,
local:local.value,
data:data.value,
categoria:categoria.value,
descricao:descricao.value
};
eventos.push(e);
salvar();
mostrar();
titulo.value="";
local.value="";
data.value="";
descricao.value="";
}

function mostrar(){
lista.innerHTML="";

eventos.forEach((e,i)=>{
lista.innerHTML+=`
<div class="event">
<h3>${e.titulo}</h3>
<p>📍 ${e.local}</p>
<p>📅 ${e.data}</p>
<p>🏷 ${e.categoria}</p>
<p>${e.descricao}</p>
<div class="actions">
<button onclick="editar(${i})">Editar</button>
<button class="delete" onclick="remover(${i})">Excluir</button>
</div>
</div>
`;
});

total.innerText=eventos.length;
participantes.innerText=eventos.length*25;
categorias.innerText=[...new Set(eventos.map(e=>e.categoria))].length;

graficoAtualizar();
}

function editar(i){
titulo.value=eventos[i].titulo;
local.value=eventos[i].local;
data.value=eventos[i].data;
descricao.value=eventos[i].descricao;
categoria.value=eventos[i].categoria;
eventos.splice(i,1);
salvar();
mostrar();
}

function remover(i){
eventos.splice(i,1);
salvar();
mostrar();
}

function buscar(){
let valor=pesquisa.value.toLowerCase();
document.querySelectorAll(".event").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(valor)?"block":"none";
});
}

function salvar(){
localStorage.setItem("eventos",JSON.stringify(eventos));
}

let chart;

function graficoAtualizar(){
let dados={};

eventos.forEach(e=>{
dados[e.categoria]=(dados[e.categoria]||0)+1;
});

let labels=Object.keys(dados);
let valores=Object.values(dados);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:labels,
datasets:[{label:"Eventos",data:valores}]
}
});
}

mostrar();
</script>

</body>
</html>
