<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventHub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
}

header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,button,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#2563EB;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.event{
border-left:6px solid #2563EB;
padding:15px;
margin-top:15px;
background:#f8f8f8;
border-radius:10px;
}

.delete{
background:red;
margin-top:10px;
}

.hidden{
display:none;
}

.info{
display:flex;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.box{
flex:1;
background:#2563EB;
padding:20px;
color:white;
border-radius:10px;
text-align:center;
}

@media(max-width:768px){
.info{
flex-direction:column;
}
}
</style>
</head>

<body>

<header>
<h1>EventHub</h1>
<p>Plataforma Inteligente de Eventos</p>
</header>

<div class="container">

<div class="card" id="loginCard">

<h2>Entrar</h2>

<input type="text" id="username" placeholder="Digite seu nome">

<button onclick="login()">
Entrar
</button>

</div>


<div id="dashboard" class="hidden">

<div class="info">

<div class="box">
<h2 id="totalEventos">0</h2>
<p>Eventos Criados</p>
</div>

<div class="box">
<h2 id="usuarioNome"></h2>
<p>Usuário</p>
</div>

</div>

<div class="card">

<h2>Criar Evento</h2>

<input id="titulo" placeholder="Nome do evento">

<input id="data" type="date">

<textarea id="descricao"
placeholder="Descrição"></textarea>

<button onclick="criarEvento()">
Criar Evento
</button>

</div>


<div class="card">

<h2>Lista de Eventos</h2>

<div id="listaEventos"></div>

</div>

</div>

</div>

<script>

let eventos=
JSON.parse(
localStorage.getItem("eventos")
)||[];


function login(){

let nome=
document.getElementById("username").value;

if(nome==""){

alert("Digite um nome");

return;

}

localStorage.setItem(
"usuario",
nome
);

document.getElementById(
"usuarioNome"
).innerText=nome;

document.getElementById(
"loginCard"
).classList.add("hidden");

document.getElementById(
"dashboard"
).classList.remove("hidden");

mostrarEventos();

}


function criarEvento(){

let titulo=
document.getElementById("titulo").value;

let data=
document.getElementById("data").value;

let descricao=
document.getElementById("descricao").value;


if(
titulo==""||
data==""||
descricao==""
){

alert(
"Preencha tudo"
);

return;

}

let evento={

titulo,
data,
descricao

};

eventos.push(evento);

localStorage.setItem(
"eventos",
JSON.stringify(eventos)
);

document.getElementById(
"titulo"
).value="";

document.getElementById(
"data"
).value="";

document.getElementById(
"descricao"
).value="";

mostrarEventos();

}


function mostrarEventos(){

let lista=
document.getElementById(
"listaEventos"
);

lista.innerHTML="";

eventos.forEach(
(evento,index)=>{

lista.innerHTML+=`

<div class="event">

<h3>${evento.titulo}</h3>

<p>
📅 ${evento.data}
</p>

<p>
${evento.descricao}
</p>

<button
class="delete"
onclick=
"remover(${index})"
>

Excluir

</button>

</div>

`;

});

document.getElementById(
"totalEventos"
).innerText=
eventos.length;

}


function remover(index){

eventos.splice(
index,
1
);

localStorage.setItem(
"eventos",
JSON.stringify(
eventos
)
);

mostrarEventos();

}


if(localStorage.getItem(
"usuario"
)){

document.getElementById(
"usuarioNome"
).innerText=
localStorage.getItem(
"usuario"
);

document.getElementById(
"loginCard"
).classList.add(
"hidden"
);

document.getElementById(
"dashboard"
).classList.remove(
"hidden"
);

mostrarEventos();

}

</script>

</body>
</html>
